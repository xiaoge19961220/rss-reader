name: Auto Build & Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'build-all.sh'
  workflow_dispatch:

jobs:
  auto-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---- 从源码提取版本号 ----
      - name: Extract version from AppConfig.java
        id: version
        run: |
          VERSION=$(grep 'VERSION = "' src/main/java/com/rssreader/AppConfig.java | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      # ---- 检查此版本是否已发布 ----
      - name: Check if release already exists
        id: check
        run: |
          if gh release view v${{ steps.version.outputs.version }} &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ Release v${{ steps.version.outputs.version }} already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- 构建标准 JAR ----
      - name: Build standard JAR
        if: steps.check.outputs.exists == 'false'
        run: mvn clean package -DskipTests -q

      # ---- 构建 Portable 包 ----
      - name: Build portable package
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x build-all.sh
          ./build-all.sh

      # ---- 创建 Release + 上传产物 ----
      - name: Create Release & Upload
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            target/rss-reader-${{ steps.version.outputs.version }}.jar
            target/rss-reader-portable-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "✅ Release already exists — skipped."
          else
            echo "✅ Release v${{ steps.version.outputs.version }} published!"
          fi
