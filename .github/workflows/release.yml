name: Auto Build & Release

on:
  push:
    branches: [main, master]
    paths: ['src/**', 'pom.xml', 'build-all.sh']
  workflow_dispatch:

jobs:
  auto-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ---- 提取版本号 ----
      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'VERSION = "' src/main/java/com/rssreader/AppConfig.java | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      # ---- 检查是否已发布 ----
      - name: Check existing release
        id: check
        run: |
          if gh release view v${{ steps.version.outputs.version }} &>/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "⚠️ v${{ steps.version.outputs.version }} already exists — skip"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---- 构建 (build-all.sh 内部已含 mvn package + jlink) ----
      - name: Build
        if: steps.check.outputs.exists == 'false'
        run: |
          chmod +x build-all.sh
          ./build-all.sh

      # ---- 确认产物 ----
      - name: Verify artifacts
        if: steps.check.outputs.exists == 'false'
        run: |
          echo "=== target 目录 ==="
          ls -lh target/*.jar target/*.zip 2>/dev/null || true
          echo ""
          echo "=== JAR ==="
          ls -lh target/rss-reader-${{ steps.version.outputs.version }}.jar 2>/dev/null || echo "JAR 不存在!"
          echo ""
          echo "=== Portable ZIP ==="
          ls -lh target/rss-reader-portable-${{ steps.version.outputs.version }}.zip 2>/dev/null || echo "Portable ZIP 不存在 (正常，CI 环境无 jlink 则跳过)"

      # ---- 收集产物列表 ----
      - name: Prepare release assets
        id: assets
        if: steps.check.outputs.exists == 'false'
        run: |
          ASSETS="target/rss-reader-${{ steps.version.outputs.version }}.jar"
          if [ -f "target/rss-reader-portable-${{ steps.version.outputs.version }}.zip" ]; then
            ASSETS="$ASSETS,target/rss-reader-portable-${{ steps.version.outputs.version }}.zip"
          fi
          echo "files=$ASSETS" >> $GITHUB_OUTPUT
          echo "Assets: $ASSETS"

      # ---- 创建 Release ----
      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.version }}
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: ${{ steps.assets.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          if [ "${{ steps.check.outputs.exists }}" = "true" ]; then
            echo "⏭ Release 已存在，跳过"
          else
            echo "✅ v${{ steps.version.outputs.version }} 发布完成"
          fi
